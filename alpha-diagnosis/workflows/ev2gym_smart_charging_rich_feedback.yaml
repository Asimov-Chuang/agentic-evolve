name: ev2gym_smart_charging_rf_alpha
adapter: adapters/ev2gym_smart_charging.yaml

primary:
  config: ../examples/ev2gym_smart_charging/config_rich_feedback.yaml
  project_name: ev2gym_smart_charging_Test

stuck:
  consecutive_no_improvement: 8
  poll_interval_seconds: 5

discovery:
  task_dir: ../examples/diagnostic-rule-discovery/ev2gym_smart_charging
  rule_set_size: 6
  source_top_n: 30
  runs: 1
  max_improvements: 15
  fresh_each_run: true

injection:
  mode: per_rule_variants
  include_rule_weights: true
  max_submissions: 6
  quota_tolerance: 2

loop:
  max_diagnosis_cycles: 10
  resume_after_injection: true
  auto_resume_on_early_exit: true
