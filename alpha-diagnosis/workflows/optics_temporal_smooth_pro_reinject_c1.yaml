name: optics_temporal_smooth_pro_reinject_c1
adapter: adapters/adaptive_temporal_smooth_control.yaml
store_raw_artifacts: false

primary:
  config: ../examples/adaptive_temporal_smooth_control/config_rich_feedback.yaml
  project_name: optics_temporal_smooth_AD2_pro_c1

stuck:
  consecutive_no_improvement: 8
  poll_interval_seconds: 5
  min_attempts_before_stuck: 20

discovery:
  mode: algorithm_based_rule
  task_dir: ../examples/algorithm-rule-discovery/adaptive_temporal_smooth_control
  rule_set_size: 8
  source_top_n: 30
  runs: 1
  max_improvements: 20
  fresh_each_run: true
  early_injection_r2_threshold: 0.95

injection:
  mode: pro
  include_rule_weights: true
  max_submissions: 8
  quota_tolerance: 2
  pro_exemplars_per_rule: 2
  pro_top_k_attempts: 10
  pro_max_proposals: 3
  pro_max_code_lines: 35
  pro_exclude_baseline_from_exemplars: true
  pro_cooccurrence_top_n: 5
  pro_cooccurrence_min_rules: 2
  pro_cooccurrence_max_rules: 3
  pro_synthesis_seed_count: 3
  pro_min_new_positive_rules: 2

loop:
  max_diagnosis_cycles: 1
  resume_after_injection: false
  auto_resume_on_early_exit: true
