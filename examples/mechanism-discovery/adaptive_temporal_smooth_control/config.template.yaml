project_name: mechanism_discovery_TEMPLATE
maximize: true

source_archive: "{{PRIMARY_ARCHIVE}}"
source_archive_top_n: 30
discovery_sample_type: trajectory

problem: problem.md
initial_program: initial_program.py
evaluator: evaluator.py

mechanism:
  max_code_predicates: 6
  max_trace_predicates: 8
  max_links: 12
  min_support: 3
  enable_predictive_r2: false

agent_readable_evaluator: true
max_improvements: 50
agent_timeout_seconds: 3600
evaluation_timeout_seconds: 600
verbose: false

opencode:
  command: opencode
  args:
    - run
    - --dangerously-skip-permissions
