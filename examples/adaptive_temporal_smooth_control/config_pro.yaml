project_name: optics_temporal_smooth_pro2
mode: pro
maximize: true
store_raw_artifacts: true
problem: problem.md
initial_program: initial_program.py
evaluator: evaluator.py
analyzer: analyzer_pro.py
opencode_config: ../../opencode.cloudgpt.json

agent_readable_evaluator: true
max_improvements: 100
agent_timeout_seconds: 108000
evaluation_timeout_seconds: 120
verbose: false

opencode:
  command: opencode
  model: cloudgpt/DeepSeek-V4-Pro
  small_model: cloudgpt/DeepSeek-V4-Pro
  args:
    - run
    - json
    - --dangerously-skip-permissions
